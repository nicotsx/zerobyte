name: Release Workflow

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-alpha.*"

permissions:
  contents: read

env:
  PUBLISH_DESKTOP_GITHUB_RELEASE_ASSETS: "false"

jobs:
  determine-release-type:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      release_type: ${{ steps.set-type.outputs.release_type }}
      tagname: ${{ github.ref_name }}
      is_minor_release: ${{ steps.set-type.outputs.is_minor_release }}
      publish_desktop_github_release_assets: ${{ steps.set-type.outputs.publish_desktop_github_release_assets }}
    steps:
      - name: Set release type
        id: set-type
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ $TAG == *-alpha* ]]; then
            echo "release_type=alpha" >> $GITHUB_OUTPUT
          elif [[ $TAG == *-beta* ]]; then
            echo "release_type=beta" >> $GITHUB_OUTPUT
          else
            echo "release_type=release" >> $GITHUB_OUTPUT
          fi

          if [[ $TAG =~ ^v[0-9]+\.[0-9]+\.0$ ]]; then
            echo "is_minor_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_minor_release=false" >> $GITHUB_OUTPUT
          fi

          echo "publish_desktop_github_release_assets=$PUBLISH_DESKTOP_GITHUB_RELEASE_ASSETS" >> $GITHUB_OUTPUT

  checks:
    uses: ./.github/workflows/checks.yml

  e2e-tests:
    uses: ./.github/workflows/e2e.yml

  integration-tests:
    uses: ./.github/workflows/integration.yml

  build-images:
    environment: release
    timeout-minutes: 15
    needs: [determine-release-type, checks, e2e-tests, integration-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          driver: cloud
          endpoint: "meienberger/runtipi-builder"
          install: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/zerobyte
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}},prefix=v,enable=${{ needs.determine-release-type.outputs.release_type == 'release' }}
            type=semver,pattern={{major}}.{{minor}},prefix=v,enable=${{ needs.determine-release-type.outputs.release_type == 'release' }}
            type=semver,pattern={{major}}.{{minor}}.{{patch}},prefix=v,enable=${{ needs.determine-release-type.outputs.release_type == 'release' }}
          flavor: |
            latest=${{ needs.determine-release-type.outputs.release_type == 'release' }}

      - name: Push images to GitHub Container Registry
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.determine-release-type.outputs.tagname }}

  publish-desktop-testflight:
    needs: [determine-release-type, checks, e2e-tests, integration-tests]
    uses: ./.github/workflows/desktop-release.yml
    permissions:
      contents: read
    with:
      release_tag: ${{ needs.determine-release-type.outputs.tagname }}
      publish_testflight: true
    secrets: inherit

  publish-desktop-github:
    needs: [determine-release-type, checks, e2e-tests, integration-tests]
    if: needs.determine-release-type.outputs.release_type == 'release' && needs.determine-release-type.outputs.publish_desktop_github_release_assets == 'true'
    uses: ./.github/workflows/desktop-release.yml
    permissions:
      contents: read
    with:
      release_tag: ${{ needs.determine-release-type.outputs.tagname }}
      upload_github_release: true
    secrets: inherit

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-images, determine-release-type, publish-desktop-github]
    if: always() && needs.determine-release-type.outputs.release_type == 'release' && needs.build-images.result == 'success' && (needs.publish-desktop-github.result == 'success' || needs.publish-desktop-github.result == 'skipped')
    permissions:
      actions: read
      contents: write
    outputs:
      id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Download desktop assets
        if: needs.determine-release-type.outputs.publish_desktop_github_release_assets == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: desktop-github-release
          path: desktop-release-assets

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            **${{ needs.determine-release-type.outputs.tagname }}**
          tag_name: ${{ needs.determine-release-type.outputs.tagname }}
          name: ${{ needs.determine-release-type.outputs.tagname }}
          draft: false
          prerelease: true

      - name: Upload desktop assets to GitHub release
        if: needs.determine-release-type.outputs.publish_desktop_github_release_assets == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.determine-release-type.outputs.tagname }}
          files: |
            desktop-release-assets/*.dmg
          fail_on_unmatched_files: true

  request-docs-version-update:
    uses: ./.github/workflows/request-docs-version-update.yml
    needs: [publish-release, determine-release-type]
    if: needs.determine-release-type.outputs.release_type == 'release' && needs.determine-release-type.outputs.is_minor_release == 'true'
    with:
      release_tag: ${{ needs.determine-release-type.outputs.tagname }}
      base_branch: ${{ github.event.repository.default_branch }}
    secrets:
      COPILOT_ASSIGNMENT_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
