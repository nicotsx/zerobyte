name: Desktop Release

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      publish_testflight:
        required: false
        type: boolean
        default: false
      upload_github_release:
        required: false
        type: boolean
        default: false
    secrets:
      APP_STORE_CONNECT_API_KEY_BASE64:
        required: false
      APP_STORE_CONNECT_API_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      CSC_KEY_PASSWORD:
        required: false
      CSC_LINK:
        required: false
      ZEROBYTE_EXPORT_COMPLIANCE_CODE:
        required: false
      ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64:
        required: false

permissions:
  contents: read

jobs:
  testflight:
    if: inputs.publish_testflight
    environment: release
    timeout-minutes: 30
    runs-on: macos-15
    permissions:
      contents: read
    env:
      ZEROBYTE_DESKTOP_VERSION: ${{ inputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Install dependencies
        uses: "./.github/actions/install-dependencies"

      - name: Install Fastlane dependencies
        working-directory: apps/desktop
        run: bundle install

      - name: Write MAS provisioning profile
        env:
          ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64: ${{ secrets.ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          : "${ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64:?Set ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64 secret}"
          profile_path="$RUNNER_TEMP/mac-app-store.provisionprofile"
          echo "ZEROBYTE_MAS_PROVISIONING_PROFILE=$profile_path" >> "$GITHUB_ENV"
          printf '%s' "$ZEROBYTE_MAS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$profile_path"
          chmod 600 "$profile_path"

      - name: Build MAS package
        working-directory: apps/desktop
        env:
          FASTLANE_HIDE_CHANGELOG: "true"
          FASTLANE_SKIP_UPDATE_CHECK: "true"
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          ZEROBYTE_EXPORT_COMPLIANCE_CODE: ${{ secrets.ZEROBYTE_EXPORT_COMPLIANCE_CODE }}
        run: bundle exec fastlane mac build_mas

      - name: Clean MAS provisioning profile
        if: always()
        run: |
          if [ -n "${ZEROBYTE_MAS_PROVISIONING_PROFILE:-}" ]; then
            rm -f "$ZEROBYTE_MAS_PROVISIONING_PROFILE"
          fi

      - name: Upload MAS package to TestFlight
        working-directory: apps/desktop
        env:
          FASTLANE_HIDE_CHANGELOG: "true"
          FASTLANE_SKIP_UPDATE_CHECK: "true"
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: bundle exec fastlane mac upload_testflight

      - name: Clean TestFlight release secrets
        if: always()
        run: |
          rm -rf apps/desktop/dist/mas-arm64

  github-release:
    if: inputs.upload_github_release
    environment: release
    timeout-minutes: 30
    runs-on: macos-15
    permissions:
      contents: read
    env:
      ZEROBYTE_DESKTOP_VERSION: ${{ inputs.release_tag }}
      ZEROBYTE_MAC_SIGN: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Install dependencies
        uses: "./.github/actions/install-dependencies"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          apple_api_key="$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY=$apple_api_key" >> "$GITHUB_ENV"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$apple_api_key"
          chmod 600 "$apple_api_key"

      - name: Build DMG
        working-directory: apps/desktop
        env:
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          ZEROBYTE_EXPORT_COMPLIANCE_CODE: ${{ secrets.ZEROBYTE_EXPORT_COMPLIANCE_CODE }}
        run: bun run make

      - name: Clean App Store Connect API key
        if: always()
        run: |
          if [ -n "${APPLE_API_KEY:-}" ]; then
            rm -f "$APPLE_API_KEY"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-github-release
          path: |
            apps/desktop/dist/*.dmg
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Clean GitHub release secrets
        if: always()
        run: |
          rm -rf apps/desktop/dist
