services:
  zerobyte-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: zerobyte
    restart: unless-stopped
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    environment:
      - NODE_ENV=development
      # Test environment variables for secret provider env:// (must be prefixed with ENV_)
      - ENV_MY_SECRET=my-secret-value-from-env
      - ENV_DATABASE_PASSWORD=super-secret-db-password
      - ENV_API_KEY=sk-1234567890abcdef
    # # Secret files used by secret provider file://
    # secrets:
    #   - db_password
    #   - api_token
    #   - encryption_key
    ports:
      - "4096:4096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte

      - ./app:/app/app
      - ~/.config/rclone:/root/.config/rclone
      # - /run/docker/plugins:/run/docker/plugins
      # - /var/run/docker.sock:/var/run/docker.sock

  zerobyte-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: zerobyte
    restart: unless-stopped
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    ports:
      - "4096:4096"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/lib/zerobyte:/var/lib/zerobyte:rshared
      - /run/docker/plugins:/run/docker/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.config/rclone:/root/.config/rclone

# # Docker secrets - these get mounted to /run/secrets/<secret_name>
# secrets:
#   db_password:
#     file: ./dev-secrets/db_password
#   api_token:
#     file: ./dev-secrets/api_token
#   encryption_key:
#     file: ./dev-secrets/encryption_key
